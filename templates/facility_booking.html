<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking - {{ facility }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at 20% 20%, rgba(0,229,255,0.18), transparent 35%),
                        radial-gradient(circle at 80% 30%, rgba(64,224,208,0.14), transparent 40%),
                        radial-gradient(circle at 50% 80%, rgba(74,0,224,0.16), transparent 45%),
                        linear-gradient(135deg, #0b1220, #0f2027, #061018);
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.7), transparent 50%),
                radial-gradient(1px 1px at 80px 120px, rgba(255,255,255,0.5), transparent 50%),
                radial-gradient(1px 1px at 160px 70px, rgba(255,255,255,0.6), transparent 50%),
                radial-gradient(1px 1px at 220px 160px, rgba(255,255,255,0.55), transparent 50%),
                radial-gradient(1px 1px at 320px 90px, rgba(255,255,255,0.65), transparent 50%),
                radial-gradient(1px 1px at 420px 150px, rgba(255,255,255,0.45), transparent 50%),
                radial-gradient(1px 1px at 520px 60px, rgba(255,255,255,0.6), transparent 50%);
            background-size: 600px 220px;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        #particles-js {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        header.navbar {
            position: relative;
            z-index: 2;
        }

        .page-wrap {
            position: relative;
            z-index: 2;
            padding: 70px 20px 60px;
            max-width: 980px;
            margin: 0 auto;
        }

        .book-title {
            text-align: center;
            margin-bottom: 22px;
        }

        .book-title h1 {
            font-size: 2.6rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00E5FF, #40E0D0, #8e2de2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 18px rgba(64,224,208,0.35));
            margin: 0;
        }

        .book-title p {
            margin-top: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 1.02rem;
        }

        .form-card {
            background: rgba(0,0,0,0.22);
            border: 1px solid rgba(0,229,255,0.22);
            border-radius: 18px;
            padding: 22px 18px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 30px rgba(0,229,255,0.12);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        @media (max-width: 860px) {
            .grid { grid-template-columns: 1fr; }
            .page-wrap { padding-top: 60px; }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-weight: 800;
            font-size: 0.92rem;
            color: rgba(255,255,255,0.9);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 12px 12px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.06);
            color: white;
            outline: none;
        }

        .field textarea {
            min-height: 120px;
            resize: vertical;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: rgba(0,229,255,0.5);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.12);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .back-btn {
            border: none;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.92);
            padding: 10px 14px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            border: 1px solid rgba(0,229,255,0.22);
        }

        .submit-btn {
            border: none;
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: white;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(142,45,226,0.35);
        }

        .fineprint {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="home">
    <header class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="SCF Hub logo icon">
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('facilities') }}">Facilities</a></li>
                <li><a href="{{ url_for('bookings_360') }}" class="btn active">Bookings</a></li>
                <li><a href="{{ url_for('contact') }}">Contact</a></li>
                <li class="dropdown">
                    <a href="#" class="btn">Login ▾</a>
                    <div class="dropdown-content">
                        <a href="#">Admin</a>
                        <a href="#">User</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <div id="particles-js"></div>

    <main class="page-wrap">
        <div class="book-title">
            <h1>Facility Booking</h1>
            <p>Selected facility: <strong>{{ facility }}</strong></p>
        </div>

        <div class="form-card">
            <form method="post" action="{{ url_for('facility_booking', facility=facility) }}">
                <div class="grid">
                    <div class="field">
                        <label for="student_name">Student Name</label>
                        <input id="student_name" name="student_name" type="text" placeholder="Enter your name" required>
                    </div>

                    <div class="field">
                        <label for="student_id">Student ID</label>
                        <input id="student_id" name="student_id" type="text" placeholder="Enter your student ID" required>
                    </div>

                    <div class="field">
                        <label for="facility">Facility</label>
                        <select id="facility" name="facility" required>
                            <option value="{{ facility }}" selected>{{ facility }}</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="date">Date</label>
                        <input id="date" name="date" type="date" required>
                    </div>

                    <div class="field">
                        <label for="duration">Duration (From - To)</label>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                            <input id="duration_from" name="duration_from" type="time" required>
                            <input id="duration_to" name="duration_to" type="time" required>
                        </div>
                    </div>


                    <div class="field">
                        <label for="purpose">Purpose</label>
                        <input id="purpose" name="purpose" type="text" placeholder="e.g., Project discussion" required>
                    </div>
                </div>





                <div class="actions">
                    <a class="back-btn" href="{{ url_for('bookings_360') }}">Back to 360 View</a>
                    <button class="submit-btn" type="submit">Submit Booking</button>
                    <div class="fineprint">Demo form: currently no backend storage is implemented.</div>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {"value": 70, "density": {"enable": true, "value_area": 900}},
                "color": {"value": "#00d4ff"},
                "shape": {"type": "circle"},
                "opacity": {"value": 0.35, "random": false},
                "size": {"value": 3, "random": true},
                "line_linked": {"enable": true, "distance": 120, "color": "#00d4ff", "opacity": 0.25, "width": 1},
                "move": {"enable": true, "speed": 3, "direction": "none", "random": false, "straight": false, "out_mode": "out"}
            },
            "interactivity": {"events": {}, "modes": {}}
        });
    </script>
</body>
</html>
