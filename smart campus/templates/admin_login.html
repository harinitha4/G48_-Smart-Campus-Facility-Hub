<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – Smart Campus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <div class="bg-overlay" aria-hidden="true"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon" style="background: linear-gradient(135deg, rgba(0,196,204,0.2), rgba(45,224,232,0.1)); border: 1px solid rgba(0,196,204,0.3);">
                    <i class="fas fa-shield-alt" style="color:#2de0e8;"></i>
                </div>
                <h1>Admin Portal</h1>
                <p style="color:#7ab8c0;">Restricted access — administrators only</p>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for msg in messages %}
                  <div style="background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.35); color:#fca5a5; padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:16px;">
                    <i class="fas fa-exclamation-circle"></i> {{ msg }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="/admin-login" class="login-form">
                <div class="input-group">
                    <label for="username"><i class="fas fa-user-shield"></i> Admin Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter admin username" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Access Admin Panel
                </button>
            </form>

            <div class="login-footer" style="margin-top:20px; border-top:1px solid rgba(0,196,204,0.1); padding-top:16px;">
                <a href="/login" style="color:#7ab8c0; font-size:13px; text-decoration:none;">
                    <i class="fas fa-arrow-left"></i> Back to Student Login
                </a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='particle-network.js') }}"></script>
</body>
</html>
