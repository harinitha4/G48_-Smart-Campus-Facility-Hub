<!DOCTYPE html>
{% extends "base.html" %}

{% block content %}
<h1>Edit Facility</h1>

<form method="POST" enctype="multipart/form-data" style="max-width: 600px;">
    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #9cdcfe;">Facility Name</label>
        <input type="text" name="name" value="{{ facility.name }}" required style="width: 100%; padding: 12px; border: 1px solid rgba(156,220,254,0.3); border-radius: 8px; background: rgba(15,42,51,0.8); color: white; font-size: 16px;">
    </div>
    
    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #9cdcfe;">Location</label>
        <input type="text" name="location" value="{{ facility.location }}" required style="width: 100%; padding: 12px; border: 1px solid rgba(156,220,254,0.3); border-radius: 8px; background: rgba(15,42,51,0.8); color: white; font-size: 16px;">
    </div>
    
    <div style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #9cdcfe;">Description</label>
        <textarea name="description" rows="5">{{ facility.description }}</textarea style="width: 100%; padding: 12px; border: 1px solid rgba(156,220,254,0.3); border-radius: 8px; background: rgba(15,42,51,0.8); color: white; font-size: 16px; resize: vertical;">
    </div>

    <div style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #9cdcfe;">Add More Pictures (optional)</label>
        <input type="file" name="facility_images" multiple accept="image/png,image/jpeg,image/jpg,image/webp" style="width: 100%; padding: 12px; border: 1px solid rgba(156,220,254,0.3); border-radius: 8px; background: rgba(15,42,51,0.8); color: white; font-size: 16px;" />
        <div style="margin-top: 8px; color: #6b7a8a; font-size: 13px;">If you upload new images, they will be added.</div>
    </div>
    
    <button type="submit" style="padding: 14px 28px; background: linear-gradient(135deg, #2196f3, #1976d2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;">💾 Update Facility</button>
    
    <a href="/admin/facilities" style="display: inline-block; margin-left: 16px; padding: 14px 24px; background: rgba(156,220,254,0.15); color: #9cdcfe; text-decoration: none; border-radius: 8px; border: 1px solid rgba(156,220,254,0.3); font-weight: 500;">← Back to Facilities</a>
</form>
{% endblock %}
