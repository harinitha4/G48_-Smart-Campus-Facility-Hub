<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Smart Campus Facilities Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .contact-container {
            padding: 100px 80px;
            max-width: 600px;
            margin: 0 auto;
        }
        .contact-container h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #00E5FF, #40E0D0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .contact-form {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .form-group textarea {
            height: 120px;
            resize: none;
        }
        .submit-btn {
            background: linear-gradient(135deg, #00E5FF, #40E0D0);
            border: none;
            color: #064e3b;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s ease;
        }
        .submit-btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="SCF Hub logo icon">
        </div>
         <nav>
            <ul>
                <li><a href="{{ url_for('index') }}">Home</a></li>
<li><a href="{{ url_for('facilities') }}">Facilities</a></li>
        <li><a href="{{ url_for('bookings_360') }}">Bookings</a></li>
<li><a href="{{ url_for('contact') }}" class="btn active">Contact</a></li>
                <li class="dropdown">
                    <a href="/login" class="btn">Login ▾</a>
                    <div class="dropdown-content">
                        <a href="/admin-login">Admin</a>
                        <a href="/user-login">User</a>
                    </div>
                </li>
            </ul>
        </nav>
    </header>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <div class="contact-form">
            <form>
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>MMU Email</label>
                    <input type="email" placeholder="yourname@mmu.edu.my">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>

    <div id="particles-js"></div>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00d4ff" },
                "shape": { "type": "circle", "stroke": { "width": 0, "color": "#000000" }, "polygon": { "nb_sides": 5 } },
                "opacity": { "value": 0.3, "random": false, "anim": { "enable": false, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3, "random": true, "anim": { "enable": false, "speed": 2, "size_min": 0.1, "sync": false } },
                "line_linked": { "enable": true, "distance": 150, "color": "#00d4ff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 6, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false, "attract": { "enable": false, "rotateX": 600, "rotateY": 1200 } }
            },
            "interactivity": {}
        });
    </script>
</body>
</html>
